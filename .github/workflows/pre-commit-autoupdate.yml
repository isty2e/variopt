name: pre-commit autoupdate

on:
  schedule:
    - cron: "43 4 * * 2"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autoupdate:
    name: update pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Update pre-commit hook versions
        run: uv run --python 3.13 --extra test pre-commit autoupdate
      - name: Open update pull request
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- .pre-commit-config.yaml; then
            echo "pre-commit hooks are already current"
            exit 0
          fi

          branch="chore/pre-commit-autoupdate"
          remote_ref="$(git ls-remote --heads origin "${branch}" | awk '{print $1}')"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "${branch}"
          git add .pre-commit-config.yaml
          git commit -m "chore: update pre-commit hooks"
          if [[ -n "${remote_ref}" ]]; then
            git push \
              --force-with-lease="refs/heads/${branch}:${remote_ref}" \
              origin \
              "HEAD:${branch}"
          else
            git push origin "HEAD:${branch}"
          fi

          body_file="$(mktemp)"
          cat > "${body_file}" <<'EOF'
          ## Summary

          - Update pinned pre-commit hook revisions to the latest tagged versions.

          ## Validation

          - `pre-commit autoupdate`
          EOF

          existing_pr="$(
            gh pr list \
              --head "${branch}" \
              --state open \
              --json number \
              --jq '.[0].number // ""'
          )"
          if [[ -n "${existing_pr}" ]]; then
            gh pr edit "${existing_pr}" \
              --title "Update pre-commit hooks" \
              --body-file "${body_file}"
          else
            gh pr create \
              --base main \
              --head "${branch}" \
              --title "Update pre-commit hooks" \
              --body-file "${body_file}"
          fi
