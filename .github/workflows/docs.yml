name: docs

on:
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "CHANGELOG.md"
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "CHANGELOG.md"
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"

jobs:
  build:
    name: mkdocs build --strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install docs dependencies
        run: python -m pip install --upgrade pip && pip install -e .[docs]
      - name: Build docs (strict)
        run: mkdocs build --strict
