name: ci

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"

jobs:
  quality:
    name: python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Lint
        run: uv run --python ${{ matrix.python-version }} --extra test ruff check pyproject.toml src tests
      - name: Type check
        run: uv run --python ${{ matrix.python-version }} --extra test basedpyright src tests
      - name: Test
        run: uv run --python ${{ matrix.python-version }} --extra test pytest tests -q
      - name: Build package
        run: uv build
