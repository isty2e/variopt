exclude: ^(legacy/|site/|dist/)
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: ["--fix", "--extend-select=I,UP"]
      - id: ruff-format
  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright
        entry: uv run --extra test basedpyright src tests .github/scripts
        language: system
        pass_filenames: false
        always_run: true
